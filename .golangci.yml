version: "2"

run:
  concurrency: 4
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    - gocritic
    - revive
    - wsl_v5
    - whitespace
    - godot
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    - gocyclo
    - nestif
    - funlen
    - dupl
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    - gosec
    - bidichk
    - testifylint
    - thelper
    - usetesting
    - paralleltest
    - modernize
    - exptostd
    - intrange
    - usestdlibvars
    - exhaustive
    - nolintlint

  disable:
    - lll
    - prealloc
    - wrapcheck
    - err113
    - mnd
    - iface
    - nakedret
    - noinlineerr
    - gocognit
    - cyclop
    - depguard
    - goheader
    - importas
    - funcorder
    - godoclint
    - varnamelen
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - unparam
    - makezero
    - testpackage
    - embeddedstructfieldcheck
    - iotamixing
    - unqueryvet
    - recvcheck
    - mirror
    - protogetter
    - spancheck
    - zerologlint
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    - sqlclosecheck
    - rowserrcheck
    - sloglint
    - loggercheck

  exclusions:
    paths:
      - vendor$
      - third_party$
      - testutils$
      - examples$
    rules:
      - path: _test\.go
        linters:
          - gosec
          - dupl
          - goconst
          - paralleltest
      - linters:
          - errcheck
        text: "Error return value of `(fmt\\.Fprint|.*\\.Close|os\\.Remove)"
      - linters:
          - nilerr
        path: internal/(cli/doctor|compiler/install_cache|runner/(float_natives|fuzz)|watch/watch)\.go
      - linters:
          - nestif
        path: internal/runner/fuzz\.go
      - linters:
          - dupl
        path: internal/runner/openmp_(player_)?objects.*\.go
      - linters:
          - dupl
        path: internal/runner/openmp_(actors_assertions|npcs_assertions|pickups_assertions|server_assertions|vehicles)\.go
      - linters:
          - dupl
          - nilerr
          - wsl_v5
        path: internal/runner/openmp_database.*\.go

  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G115
        - G204
        - G301
        - G302
        - G306
        - G404
        - G104
        - G304
        - G703
    funlen:
      lines: 160
      statements: 100
    goconst:
      min-len: 3
      min-occurrences: 4
    gocyclo:
      min-complexity: 40
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
