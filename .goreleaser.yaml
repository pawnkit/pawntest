version: 2

builds:
  - id: pawntest
    main: ./cmd/pawntest
    binary: pawntest
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/pawnkit/pawntest/internal/cli.Version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
